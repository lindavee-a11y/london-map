<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>London Trip Map with Days</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>html,body,#map{height:100%;margin:0;font-family:Arial,sans-serif}.panel{position:absolute;z-index:1000;top:12px;left:12px;right:12px;max-width:460px;background:rgba(255,255,255,.96);padding:14px;border-radius:14px;box-shadow:0 2px 12px #0004}h1{font-size:19px;margin:0 0 6px;color:#174A7C}.buttons{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}.buttons button{background:#174A7C;color:#fff;border:0;border-radius:18px;padding:8px 12px;font-size:14px}.legend{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;font-size:13px}.dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:6px}.directions{font-size:13px;margin-top:8px;max-height:150px;overflow:auto}.leaflet-popup-content{font-size:14px}.gm{display:inline-block;margin-top:6px;background:#174A7C;color:#fff!important;padding:7px 9px;border-radius:8px;text-decoration:none}@media(max-width:650px){.panel{max-width:none}.directions{max-height:120px}}</style></head><body><div id="map"></div><div class="panel"><h1>London 2026 Trip Map</h1><p>Choose a day to show only that day’s route.</p><div class="buttons"><button onclick="showDay('All')">All</button><button onclick="showDay('Monday')">Monday</button><button onclick="showDay('Tuesday')">Tuesday</button><button onclick="showDay('Wednesday')">Wednesday</button><button onclick="showDay('Thursday')">Thursday</button><button onclick="showDay('Friday')">Friday</button><button onclick="showDay('Saturday')">Saturday</button></div><div class="legend"><span><span class="dot" style="background:#7b1fa2"></span>Hotel/Rail</span><span><span class="dot" style="background:#2b7bff"></span>Venue</span><span><span class="dot" style="background:#e53935"></span>Restaurant</span><span><span class="dot" style="background:#111"></span>Tube</span><span><span class="dot" style="background:#2e7d32"></span>Walking line</span><span><span class="dot" style="background:#1565c0"></span>Public transport line</span></div><div id="directions" class="directions">Tap a day button to see that day’s route.</div></div><script>
const places={hotel:[51.5444,-0.1624,'Hampstead Britannia Hotel','Hotel'],stpancras:[51.5319,-0.1264,'St Pancras International','Rail'],camden:[51.5413,-0.1461,'Camden Market','Venue'],primrose:[51.5399,-0.1614,'Primrose Hill','Venue'],regents:[51.5311,-0.1599,"Regent's Park",'Venue'],library:[51.53,-0.1277,'British Library','Venue'],coal:[51.5366,-0.1254,'Coal Drops Yard','Venue'],roundhouse:[51.5433,-0.1518,'Roundhouse','Venue'],museum:[51.5194,-0.127,'British Museum','Venue'],covent:[51.5117,-0.123,'Covent Garden','Venue'],soho:[51.5136,-0.1365,'Soho','Venue'],nandosSoho:[51.5141,-0.1317,"Nando's Soho",'Restaurant'],va:[51.4966,-0.1722,'Victoria and Albert Museum','Venue'],hyde:[51.5073,-0.1657,'Hyde Park','Venue'],heath:[51.5608,-0.1657,'Hampstead Heath','Venue'],wallace:[51.5173,-0.1529,'Wallace Collection','Venue'],nandosFinchley:[51.5481,-0.1812,"Nando's Finchley Road",'Restaurant'],chalk:[51.5441,-0.1537,'Chalk Farm Underground','Tube'],kings:[51.5308,-0.1238,"King's Cross St Pancras Underground",'Tube'],tcr:[51.5162,-0.1309,'Tottenham Court Road Underground','Tube'],southKen:[51.4941,-0.1738,'South Kensington Underground','Tube'],finchley:[51.5472,-0.1803,'Finchley Road Underground','Tube'],bond:[51.5172,-0.1492,'Bond Street Underground','Tube']};
const routes={Monday:[['stpancras','hotel','transit'],['hotel','camden','walk'],['camden','primrose','walk'],['primrose','regents','walk'],['regents','hotel','walk']],Tuesday:[['hotel','chalk','walk'],['chalk','kings','transit'],['kings','library','walk'],['library','coal','walk'],['coal','hotel','transit'],['hotel','roundhouse','walk'],['roundhouse','hotel','walk']],Wednesday:[['hotel','chalk','walk'],['chalk','tcr','transit'],['tcr','museum','walk'],['museum','covent','walk'],['covent','soho','walk'],['soho','hotel','transit'],['hotel','tcr','transit'],['tcr','nandosSoho','walk'],['nandosSoho','hotel','transit']],Thursday:[['hotel','chalk','walk'],['chalk','southKen','transit'],['southKen','va','walk'],['va','hyde','walk'],['hyde','hotel','transit']],Friday:[['hotel','heath','walk'],['heath','bond','transit'],['bond','wallace','walk'],['wallace','hotel','transit'],['hotel','finchley','transit'],['finchley','nandosFinchley','walk'],['nandosFinchley','hotel','transit']],Saturday:[['hotel','chalk','walk'],['chalk','stpancras','transit']]};
const map=L.map('map').setView([51.528,-0.15],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);function c(t){return t==='Restaurant'?'#e53935':t==='Tube'?'#111':(t==='Hotel'||t==='Rail')?'#7b1fa2':'#2b7bff'}function icon(t){return L.divIcon({className:'',html:`<div style="background:${c(t)};width:22px;height:22px;border-radius:50%;border:4px solid white;box-shadow:0 1px 6px #0008"></div>`,iconSize:[30,30],iconAnchor:[15,15]})}let markers=[],lines=[];function addMarker(k){let p=places[k];let m=L.marker([p[0],p[1]],{icon:icon(p[3])}).addTo(map).bindPopup(`<b>${p[2]}</b><br>${p[3]}<br><a class="gm" href="https://www.google.com/maps/search/?api=1&query=${p[0]},${p[1]}" target="_blank">Open in Google Maps</a>`);markers.push(m);return [p[0],p[1]]}function clear(){markers.forEach(m=>map.removeLayer(m));lines.forEach(l=>map.removeLayer(l));markers=[];lines=[]}function showDay(day){clear();let bounds=[];let text='<b>'+day+'</b><ol>';if(day==='All'){Object.keys(places).forEach(k=>bounds.push(addMarker(k)));document.getElementById('directions').innerHTML='All locations are shown. Choose a day for route lines.'}else{routes[day].forEach(seg=>{let a=places[seg[0]],b=places[seg[1]];bounds.push(addMarker(seg[0]));bounds.push(addMarker(seg[1]));lines.push(L.polyline([[a[0],a[1]],[b[0],b[1]]],{color:seg[2]==='walk'?'#2e7d32':'#1565c0',weight:5,dashArray:seg[2]==='walk'?'8,10':null,opacity:.85}).addTo(map));text+=`<li>${seg[2]==='walk'?'Walk':'Public transport'}: ${a[2]} → ${b[2]}</li>`});document.getElementById('directions').innerHTML=text+'</ol>'}map.fitBounds(bounds,{padding:[30,30]})}showDay('All');
</script></body></html>
