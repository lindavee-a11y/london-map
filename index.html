<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>London 2026 Trip Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html,body,#map{height:100%;margin:0;font-family:Arial,sans-serif}

.panel{
 position:absolute;z-index:1000;
 top:12px;left:12px;right:12px;
 max-width:560px;
 background:rgba(255,255,255,.96);
 padding:14px;border-radius:14px;
 box-shadow:0 2px 12px #0004;
}

/* collapse */
.panel.collapsed{width:180px;padding:10px;}
.panel.collapsed #directions{display:none;}

.expand-btn{
 position:absolute;
 top:10px;right:-40px;
 background:#174A7C;color:white;
 border-radius:8px;
 padding:6px 8px;
 cursor:pointer;
 display:none;
}
.panel.collapsed .expand-btn{display:block;}

.buttons{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
button{background:#174A7C;color:#fff;border:0;border-radius:18px;padding:8px 12px;cursor:pointer}
.nandos{background:#e85d04}

.directions{font-size:13px;margin-top:8px;max-height:230px;overflow:auto;border-top:1px solid #ddd;padding-top:8px}
.time{font-weight:bold;color:#174A7C}

/* icons */
.marker{
 width:22px;height:22px;border-radius:50%;
 border:4px solid white;box-shadow:0 1px 6px #0008
}
.hotel,.rail{background:#7b1fa2}
.venue{background:#2b7bff}
.restaurant{background:#e53935}
.tube{background:#111}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<h1>London 2026 Trip Map</h1>

<div class="buttons">
<button onclick="showDay('All')">All</button>
<button onclick="showDay('Monday')">Monday</button>
<button onclick="showDay('Tuesday')">Tuesday</button>
<button onclick="showDay('Wednesday')">Wednesday</button>
<button onclick="showDay('Thursday')">Thursday</button>
<button onclick="showDay('Friday')">Friday</button>
<button onclick="showDay('Saturday')">Saturday</button>
<button class="nandos" onclick="toggleNandos()">Best Nando's</button>
</div>

<div id="directions">Tap a day to view details</div>
</div>

<script>

// ===== DATA =====
const places={
 hotel:[51.5444,-0.1624,'Hampstead Britannia Hotel','hotel'],
 stpancras:[51.5319,-0.1264,'St Pancras International','rail'],
 camden:[51.5413,-0.1461,'Camden Market','venue'],
 primrose:[51.5399,-0.1614,'Primrose Hill','venue'],
 regents:[51.5311,-0.1599,"Regent's Park",'venue'],
 library:[51.5300,-0.1277,'British Library','venue'],
 coal:[51.5366,-0.1254,'Coal Drops Yard','venue'],
 roundhouse:[51.5433,-0.1518,'Roundhouse','venue'],
 kew:[51.4783,-0.2980,'Kew Gardens','venue'],
 covent:[51.5117,-0.1230,'Covent Garden','venue'],
 soho:[51.5136,-0.1365,'Soho','venue'],
 nandosSoho:[51.5141,-0.1317,"Nando's Soho",'restaurant'],
 va:[51.4966,-0.1722,'Victoria & Albert Museum','venue'],
 hyde:[51.5073,-0.1657,'Hyde Park','venue'],
 heath:[51.5608,-0.1657,'Hampstead Heath','venue'],
 wallace:[51.5173,-0.1529,'Wallace Collection','venue'],
 nandosFinchley:[51.5481,-0.1812,"Nando's Finchley Road",'restaurant'],
 chalk:[51.5441,-0.1537,'Chalk Farm Underground','tube'],
 kings:[51.5308,-0.1238,"King's Cross Underground",'tube'],
 tcr:[51.5162,-0.1309,'Tottenham Court Road Underground','tube'],
 southKen:[51.4941,-0.1738,'South Kensington Underground','tube'],
 kewStation:[51.4770,-0.2850,'Kew Gardens Station','tube'],
 finchley:[51.5472,-0.1803,'Finchley Road Underground','tube']
};

// ===== TIMETABLE =====
const timetable = {
 Monday:[
 ['13:57','stpancras','Arrive St Pancras'],
 ['14:45–15:15','hotel','Travel to hotel'],
 ['15:30','hotel','Check-in'],
 ['17:00','camden','Camden Market'],
 ['18:30','primrose','Primrose Hill'],
 ['19:30','camden','Dinner'],
 ['Evening','hotel','Relax']
 ],
 Tuesday:[
 ['10:00','library','British Library'],
 ['13:30','coal','Coal Drops Yard'],
 ['17:30','camden','Dinner'],
 ['19:00','roundhouse','Concert']
 ],
 Wednesday:[
 ['11:00','kew','Kew Gardens'],
 ['18:00','covent','Covent Garden'],
 ['19:00','nandosSoho','Dinner']
 ],
 Thursday:[
 ['11:00','va','V&A Museum'],
 ['14:30','hyde','Hyde Park']
 ],
 Friday:[
 ['10:30','heath','Hampstead Heath'],
 ['14:30','wallace','Wallace Collection'],
 ['18:30','nandosFinchley','Dinner']
 ],
 Saturday:[
 ['12:30','stpancras','Travel'],
 ['13:49','stpancras','Departure']
 ]
};

// ===== ROUTES =====
const routes={
 Monday:[['stpancras','hotel','transit'],['hotel','camden','walk'],['camden','primrose','walk']],
 Tuesday:[['hotel','library','transit'],['library','coal','walk'],['coal','roundhouse','walk']],
 Wednesday:[['hotel','kewStation','transit'],['kewStation','kew','walk'],['kew','covent','transit']],
 Thursday:[['hotel','southKen','transit'],['southKen','va','walk']],
 Friday:[['hotel','heath','walk'],['heath','wallace','transit']],
 Saturday:[['hotel','stpancras','transit']]
};

// ===== MAP =====
const map=L.map('map').setView([51.528,-0.15],12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

let markers=[],lines=[];

function icon(type){
 return L.divIcon({
  className:'',
  html:`<div class="marker ${type}"></div>`,
  iconSize:[30,30],iconAnchor:[15,15]
 });
}

function addMarker(k){
 let p=places[k];
 let m=L.marker([p[0],p[1]],{icon:icon(p[3])})
 .addTo(map)
 .bindPopup(`<b>${p[2]}</b><br>
 <a href="https://www.google.com/maps/search/?api=1&query=${p[0]},${p[1]}" target="_blank">Open in Maps</a>`);
 markers.push(m);
 return [p[0],p[1]];
}

function clearMap(){
 markers.forEach(m=>map.removeLayer(m));
 lines.forEach(l=>map.removeLayer(l));
 markers=[];lines=[];
}

function scheduleHtml(day){
 return '<b>'+day+'</b><ol>' +
 timetable[day].map(t =>
 `<li><span class="time">${t[0]}</span> ${t[2]} (${places[t[1]][2]})</li>`
 ).join('')+'</ol>';
}

function showDay(day){
 clearMap();
 let bounds=[];

 if(day==='All'){
  Object.keys(places).forEach(k=>bounds.push(addMarker(k)));
  document.getElementById('directions').innerHTML='All locations';
 } else {

  routes[day].forEach(r=>{
   let a=places[r[0]], b=places[r[1]];
   lines.push(L.polyline([[a[0],a[1]],[b[0],b[1]]],{
     color:r[2]==='walk'?'#2e7d32':'#1565c0',
     dashArray:r[2]==='walk'?'8,8':null,
     weight:5
   }).addTo(map));

   bounds.push(addMarker(r[0]));
   bounds.push(addMarker(r[1]));
  });

  document.getElementById('directions').innerHTML=scheduleHtml(day);
 }

 if(bounds.length) map.fitBounds(bounds,{padding:[30,30]});
}

// collapse
function collapsePanel(){
 document.querySelector('.panel').classList.add('collapsed');
}
function expandPanel(){
 let p=document.querySelector('.panel');
 p.classList.remove('collapsed');
 setTimeout(()=>p.classList.add('collapsed'),15000);
}

const original=showDay;
showDay=function(day){original(day);collapsePanel();}

setTimeout(()=>{
 let p=document.querySelector('.panel');
 let b=document.createElement('div');
 b.className='expand-btn';
 b.innerHTML='☰';
 b.onclick=expandPanel;
 p.appendChild(b);
},500);

// START
showDay('All');

</script>

</body>
</html>
