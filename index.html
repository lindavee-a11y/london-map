<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>London 2026 Trip Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body, #map { height:100%; margin:0; }
.panel {
 position:absolute; z-index:1000; top:10px; left:10px;
 background:white; padding:10px; border-radius:10px;
 max-width:300px;
}
button { margin:2px; padding:6px 10px; }
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<b>London Trip 2026</b><br><br>
<button onclick="showDay('All')">All</button>
<button onclick="showDay('Monday')">Mon</button>
<button onclick="showDay('Tuesday')">Tue</button>
<button onclick="showDay('Wednesday')">Wed (Kew)</button>
<button onclick="showDay('Thursday')">Thu</button>
<button onclick="showDay('Friday')">Fri</button>
<button onclick="showDay('Saturday')">Sat</button>
<p id="info"></p>
</div>

<script>

const map = L.map('map').setView([51.51,-0.14],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

const places = {
 hotel:[51.5444,-0.1624,"Hotel"],
 camden:[51.5413,-0.1461,"Camden Market"],
 primrose:[51.5399,-0.1614,"Primrose Hill"],
 kew:[51.4783,-0.2980,"Kew Gardens"],
 museum:[51.4966,-0.1722,"V&A Museum"],
 heath:[51.5608,-0.1657,"Hampstead Heath"],
 wallace:[51.5173,-0.1529,"Wallace Collection"]
};

const timetable = {
 Monday:[
  "13:57 Arrive St Pancras",
  "17:00 Camden Market",
  "18:30 Primrose Hill walk"
 ],
 Wednesday:[
  "10:00 Travel to Kew",
  "11:00–14:30 Kew Gardens",
  "18:30 Nando’s Soho"
 ]
};

let markers = [];

function clearMap(){
 markers.forEach(m => map.removeLayer(m));
 markers = [];
}

function addMarker(p){
 let m = L.marker([p[0],p[1]]).addTo(map)
   .bindPopup("<b>"+p[2]+"</b>");
 markers.push(m);
}

function showDay(day){
 clearMap();

 if(day==="All"){
  Object.values(places).forEach(addMarker);
  document.getElementById("info").innerHTML="All locations";
 }

 if(day==="Monday"){
  addMarker(places.hotel);
  addMarker(places.camden);
  addMarker(places.primrose);
  document.getElementById("info").innerHTML=timetable.Monday.join("<br>");
 }

 if(day==="Wednesday"){
  addMarker(places.kew);
  document.getElementById("info").innerHTML=timetable.Wednesday.join("<br>");
 }
}

showDay("All");

</script>

</body>
</html>
