<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>London Trip Map</title><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><style>html,body,#map{height:100%;margin:0;font-family:Arial,sans-serif}.panel{position:absolute;z-index:1000;top:12px;left:12px;right:12px;max-width:420px;background:rgba(255,255,255,.95);padding:14px;border-radius:14px;box-shadow:0 2px 12px #0004}h1{font-size:19px;margin:0 0 6px;color:#174A7C}.legend{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;font-size:13px}.dot{display:inline-block;width:11px;height:11px;border-radius:50%;margin-right:6px}.leaflet-popup-content{font-size:14px}.gm{display:inline-block;margin-top:6px;background:#174A7C;color:#fff!important;padding:7px 9px;border-radius:8px;text-decoration:none}</style></head><body><div id="map"></div><div class="panel"><h1>London 2026 Trip Map</h1><p>Venues, restaurants, hotel and Tube stations. Tap pins for Google Maps.</p><div class="legend"><span><span class="dot" style="background:#7b1fa2"></span>Hotel/Rail</span><span><span class="dot" style="background:#2b7bff"></span>Venue</span><span><span class="dot" style="background:#e53935"></span>Restaurant</span><span><span class="dot" style="background:#111"></span>Tube</span></div></div><script>
const pts=[[51.5444,-0.1624,'Hampstead Britannia Hotel','Hotel'],[51.5319,-0.1264,'St Pancras International','Rail'],[51.5413,-0.1461,'Camden Market','Venue'],[51.5399,-0.1614,'Primrose Hill','Venue'],[51.5311,-0.1599,"Regent's Park",'Venue'],[51.53,-0.1277,'British Library','Venue'],[51.5366,-0.1254,'Coal Drops Yard','Venue'],[51.5433,-0.1518,'Roundhouse','Venue'],[51.5194,-0.127,'British Museum','Venue'],[51.5117,-0.123,'Covent Garden','Venue'],[51.5136,-0.1365,'Soho','Venue'],[51.5141,-0.1317,"Nando's Soho",'Restaurant'],[51.4966,-0.1722,'Victoria and Albert Museum','Venue'],[51.5073,-0.1657,'Hyde Park','Venue'],[51.5608,-0.1657,'Hampstead Heath','Venue'],[51.5173,-0.1529,'Wallace Collection','Venue'],[51.5481,-0.1812,"Nando's Finchley Road",'Restaurant'],[51.5441,-0.1537,'Chalk Farm Underground','Tube'],[51.5308,-0.1238,"King's Cross St Pancras Underground",'Tube'],[51.5162,-0.1309,'Tottenham Court Road Underground','Tube'],[51.4941,-0.1738,'South Kensington Underground','Tube'],[51.5472,-0.1803,'Finchley Road Underground','Tube']];
const map=L.map('map').setView([51.528,-0.15],12);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);function c(t){return t==='Restaurant'?'#e53935':t==='Tube'?'#111':(t==='Hotel'||t==='Rail')?'#7b1fa2':'#2b7bff'}function icon(t){return L.divIcon({className:'',html:`<div style="background:${c(t)};width:22px;height:22px;border-radius:50%;border:4px solid white;box-shadow:0 1px 6px #0008"></div>`,iconSize:[30,30],iconAnchor:[15,15]})}let b=[];pts.forEach(p=>{b.push([p[0],p[1]]);L.marker([p[0],p[1]],{icon:icon(p[3])}).addTo(map).bindPopup(`<b>${p[2]}</b><br>${p[3]}<br><a class="gm" href="https://www.google.com/maps/search/?api=1&query=${p[0]},${p[1]}" target="_blank">Open in Google Maps</a>`)});map.fitBounds(b,{padding:[30,30]});
</script></body></html>
