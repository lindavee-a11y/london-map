<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>London Trip Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body, #map { height:100%; margin:0; font-family:Arial; }
.panel {
  position:absolute; z-index:1000; top:10px; left:10px;
  background:white; padding:10px; border-radius:10px;
}
button { margin:3px; padding:6px 10px; }
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <b>London Trip 2026</b><br>
  <button onclick="showDay('All')">All</button>
  <button onclick="showDay('Monday')">Mon</button>
  <button onclick="showDay('Wednesday')">Wed (Kew)</button>
</div>

<script>

const map = L.map('map').setView([51.51,-0.14],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

// Locations
const places = {
  hotel: [51.5444,-0.1624,"Hotel"],
  camden: [51.5413,-0.1461,"Camden Market"],
  kew: [51.4783,-0.2980,"Kew Gardens"]
};

let markers = [];

function clearMap(){
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

// Simple day logic
function showDay(day){
  clearMap();

  if(day==="All"){
    Object.values(places).forEach(p=>{
      addMarker(p);
    });
  }

  if(day==="Monday"){
    addMarker(places.hotel);
    addMarker(places.camden);
  }

  if(day==="Wednesday"){
    addMarker(places.kew);
  }
}

function addMarker(p){
  let m = L.marker([p[0],p[1]]).addTo(map)
    .bindPopup("<b>"+p[2]+"</b>");
  markers.push(m);
}

showDay("All");

</script>
</body>
</html>
