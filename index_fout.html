<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>London Trip Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
html, body, #map { height:100%; margin:0; font-family:Arial; }

.panel{
 position:absolute;
 top:15px;
 left:15px;
 background:white;
 padding:15px;
 border-radius:12px;
 width:320px;
 box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.panel h1{
 font-size:18px;
 margin:0 0 10px;
}

button{
 margin:3px;
 padding:6px 10px;
 border-radius:6px;
 border:0;
 background:#174A7C;
 color:white;
 cursor:pointer;
}

button:hover{
 background:#2b7bff;
}

#info{
 margin-top:10px;
 font-size:13px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<h1>London Trip 2026</h1>

<button onclick="showDay('All')">All</button>
<button onclick="showDay('Monday')">Mon</button>
<button onclick="showDay('Tuesday')">Tue</button>
<button onclick="showDay('Wednesday')">Wed</button>
<button onclick="showDay('Thursday')">Thu</button>
<button onclick="showDay('Friday')">Fri</button>

<div id="info">All locations</div>
</div>

<script>

const map = L.map('map').setView([51.51,-0.14],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// Locations
const places = {
 hotel:[51.5444,-0.1624,"Hotel"],
 camden:[51.5413,-0.1461,"Camden Market"],
 primrose:[51.5399,-0.1614,"Primrose Hill"],
 kew:[51.4783,-0.2980,"Kew Gardens"],
 covent:[51.5117,-0.1230,"Covent Garden"],
 soho:[51.5136,-0.1365,"Soho"]
};

// Timetable (with your FIX ✅)
const timetable = {

 Monday:[
  "13:57 Arrive St Pancras",
  "15:30 Check‑in hotel",
  "17:00 Camden Market",
  "18:30 Primrose Hill walk"
 ],

 Tuesday:[
  "10:00 British Library",
  "13:30 Coal Drops Yard",
  "19:00 Concert"
 ],

 Wednesday:[
  "10:00 Travel to Kew",
  "11:00–14:30 Kew Gardens",
  "15:00 Return hotel",
  "16:00–17:30 Refresh & rest ✅",
  "18:00 Covent Garden",
  "19:00 Nando’s Soho"
 ],

 Thursday:[
  "10:45 V&A Museum",
  "14:30 Relax / Hyde Park"
 ],

 Friday:[
  "10:30 Hampstead Heath",
  "14:30 Wallace Collection",
  "18:30 Nando’s Finchley Road"
 ]
};

let markers = [];

function clearMap(){
 markers.forEach(m => map.removeLayer(m));
 markers = [];
}

function addMarker(p){
 let m = L.marker([p[0],p[1]]).addTo(map)
 .bindPopup("<b>"+p[2]+"</b>");
 markers.push(m);
}

function showDay(day){

 clearMap();

 if(day==="All"){
  Object.values(places).forEach(addMarker);
  document.getElementById("info").innerHTML="All locations";
 }

 if(day==="Monday"){
  addMarker(places.hotel);
  addMarker(places.camden);
  addMarker(places.primrose);
  document.getElementById("info").innerHTML=timetable.Monday.join("<br>");
 }

 if(day==="Tuesday"){
  document.getElementById("info").innerHTML=timetable.Tuesday.join("<br>");
 }

 if(day==="Wednesday"){
  addMarker(places.kew);
  document.getElementById("info").innerHTML=timetable.Wednesday.join("<br>");
 }

 if(day==="Thursday"){
  document.getElementById("info").innerHTML=timetable.Thursday.join("<br>");
 }

 if(day==="Friday"){
  document.getElementById("info").innerHTML=timetable.Friday.join("<br>");
 }
}

showDay("All");

</script>

</body>
</html>
